<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Odyssée de l'Île d'Émie</title>
    <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFDD0;
            --accent-blue: #40E0D0; /* Turquoise water */
            --accent-pink: #FFC2D1;
            --text-color: #5D5D5D;
            --font-main: 'Open-Dyslexic', sans-serif;
            --island-green: #D1FFA2; /* Tender green grass */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color);
            overflow: hidden;
            touch-action: manipulation;
            font-size: 24px;
        }

        * {
            text-shadow: 0 0 5px rgba(255,255,255,0.8), 1px 1px 2px rgba(255,255,255,1);
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* L'Île Magique */
        #island-view {
            width: 90%;
            height: 60%;
            background: var(--island-green);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: 0 20px 0 #b8e689, inset 0 -10px 20px rgba(0,0,0,0.05);
            margin-top: 50px;
            overflow: visible;
        }

        .island-object {
            position: absolute;
            font-size: 2rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2.2rem;
            color: #ff6b8b; /* Slightly darker pink for better contrast */
            margin: 20px 0;
        }

        .btn {
            background-color: var(--accent-blue);
            border: none;
            border-radius: 50px;
            padding: 20px 40px;
            font-size: 1.4rem; /* ~33px */
            font-family: var(--font-main);
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #36c2b4;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 10px;
            z-index: 50;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #36c2b4;
        }

        .btn {
            z-index: 50;
            position: relative;
        }

        /* Hitbox plein écran */
        .giant-tap-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Espace Pro (En haut à droite) */
        #pro-trigger {
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            z-index: 100;
        }

        #pro-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            z-index: 200;
            display: none;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .kawaii-card {
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 8px solid var(--accent-blue);
            z-index: 50;
            position: relative;
            pointer-events: none; /* Nécessaire pour Rhythm mode, on override sur les boutons */
            max-height: 85vh;
            overflow-y: auto;
            width: 95%;
            max-width: 600px;
        }

        .kawaii-card * {
            pointer-events: auto; /* Réactiver pour tous les éléments internes */
        }

        /* Progression */
        #success-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 4px solid var(--accent-pink);
            z-index: 100;
            display: block !important;
        }


        #mic-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 4px solid var(--accent-blue);
            font-size: 1.2rem;
            display: none;
            z-index: 100;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        /* Feedback Rythme / Voix */
        #visual-feedback {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 60;
        }

        /* Schéma Guide Parent */
        #parent-guide {
            margin-top: 20px;
            display: none;
            background: #fff;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        /* Animations */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: floating 3s ease-in-out infinite; }

        /* Styles spécifique PROMPT */
        #prompt-stage {
            width: 100%;
            height: 250px;
            position: relative;
            display: none;
            overflow: hidden;
            background: rgba(255,255,255,0.5);
            border-radius: 30px;
            margin: 15px 0;
        }

        #prompt-balloon {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s ease-out;
        }

        #prompt-tempo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #prompt-jumper {
            position: absolute;
            left: 20%;
            bottom: 20px;
        }

        .jump-animation {
            animation: jumpArc 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes jumpArc {
            0% { left: 20%; bottom: 20px; }
            50% { bottom: 150px; }
            100% { left: 70%; bottom: 20px; }
        }

        .btn-prompt {
            background-color: var(--accent-pink);
            box-shadow: 0 8px 0 #e6a2b3;
            font-size: 1.4rem !important; /* Ensure 32px+ */
        }

        .btn-prompt:active {
            box-shadow: 0 4px 0 #e6a2b3;
        }

        #current-word {
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

    </style>
</head>
<body>

<div id="app">
    <div id="success-counter">Étoiles : <span id="star-count">0</span>/3</div>
    <div id="mic-indicator">🎤 Micro Actif</div>

    <!-- Menu / Île Centrale -->
    <div id="screen-menu" class="screen active">
        <h1 class="floating">L'Île d'Émie</h1>

        <div id="island-view">
            <!-- Les objets seront ajoutés ici -->
        </div>

        <div style="margin-top: 20px;">
            <button class="btn" onclick="game.start('rhythm')">Rythme</button>
            <button class="btn" onclick="game.start('voice')">Voix</button>
        </div>

        <div style="margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
            <div style="width: 100%; color: #ff6b8b; font-size: 1.5rem;">Module PROMPT 👄</div>
            <button class="btn btn-prompt" onclick="game.start('prompt', 'ascenseur')">Ascenseur</button>
            <button class="btn btn-prompt" onclick="game.start('prompt', 'bisou')">Bisou</button>
            <button class="btn btn-prompt" onclick="game.start('prompt', 'saut')">Saut</button>
        </div>
    </div>

    <!-- Écran de Jeu -->
    <div id="screen-game" class="screen">
        <button class="btn" onclick="game.quit()" style="position: absolute; bottom: 20px; left: 20px; z-index: 110; font-size: 1.2rem; padding: 15px 30px;">Quitter</button>
        <div class="kawaii-card">
            <h2 id="current-word" style="font-size: 3rem; margin: 10px 0;">...</h2>

            <div id="prompt-stage">
                <div id="prompt-balloon"></div>
                <div id="prompt-tempo"></div>
                <div id="prompt-jumper"></div>
            </div>

            <div id="reward-display" style="height: 100px;"></div>

            <button id="btn-manual-validate" class="btn" onclick="game.onSuccess()" style="display: none; background: #FFD1A2; box-shadow: 0 8px 0 #e6b889; font-size: 1.2rem; padding: 10px 30px;">Valider l'effort 👍</button>

            <div id="parent-guide" style="padding: 15px; border: 2px dashed var(--accent-blue); margin-top: 15px;">
                <strong id="guide-title" style="color: var(--accent-blue);">Guide Parent : Points de Pression 👄</strong><br>
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px;">
                    <div id="guide-svg-container">
                        <svg width="60" height="60" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="none" stroke="#5D5D5D" stroke-width="2"/>
                            <path d="M 30 65 Q 50 85 70 65" fill="none" stroke="red" stroke-width="4"/> <!-- Lèvres -->
                            <circle cx="50" cy="45" r="5" fill="red" opacity="0.6"/> <!-- Palais -->
                            <path d="M 40 45 L 60 45" stroke="red" stroke-width="2"/> <!-- Dents -->
                        </svg>
                    </div>
                    <div id="guide-text" style="text-align: left; font-size: 1.2rem; line-height: 1.4;">
                        • Stimulez les lèvres pour le 'B' et 'OU'.<br>
                        • Dos de la langue pour le 'K'.<br>
                        • Pointe derrière les dents pour le 'T'.
                    </div>
                </div>
            </div>
        </div>
        <div class="giant-tap-zone" id="tap-zone"></div>
        <div id="visual-feedback"></div>
    </div>

    <!-- Espace Pro Trigger -->
    <div id="pro-trigger"></div>

    <!-- Panneau Pro -->
    <div id="pro-panel">
        <h2>Espace Pro</h2>
        <div class="settings" style="text-align: left;">
            <p>BPM: <input type="range" id="setting-bpm" min="40" max="120" value="60"> <span id="val-bpm">60</span></p>
            <p>Delta (ms): <input type="range" id="setting-delta" min="50" max="400" value="200"> <span id="val-delta">200</span></p>
            <p>Sensibilité Micro: <input type="range" id="setting-mic" min="1" max="100" value="50"> <span id="val-mic">50</span></p>
            <div style="height: 20px; background: #eee; width: 100%; border-radius: 5px; margin-bottom: 10px; display: block;">
                <div id="vumeter" style="height: 20px; width: 10%; background: var(--accent-blue); border-radius: 5px; display: block;"></div>
            </div>
            <hr>
            <h3>Historique</h3>
            <div id="history-log" style="font-size: 0.8rem; max-height: 150px; overflow-y: auto; border: 1px solid #ddd; padding: 5px;"></div>
            <button class="btn" style="font-size: 1rem;" onclick="pro.exportCSV()">Exporter CSV</button>
            <button class="btn" style="font-size: 1rem; background: var(--accent-pink);" onclick="pro.resetIsland()">Réinitialiser l'Île</button>
        </div>
        <button class="btn" onclick="pro.hide()">Fermer</button>
    </div>

    <canvas id="confetti-canvas"></canvas>
</div>

<script>
    const game = {
        mode: null,
        promptSubMode: null,
        bpm: 60,
        delta: 200,
        micSensitivity: 50,
        successCount: 0,
        stars: 0,
        islandObjects: [],
        history: [],
        voiceHoldCounter: 0,
        balloonY: 50,

        promptConfigs: {
            'ascenseur': {
                title: "L'Ascenseur d'Émie",
                guide: "Placez votre index sous le menton pour aider à contrôler l'ouverture. 'A' fait descendre, 'I/OU' fait monter.",
                instructions: "Chante pour faire bouger la montgolfière !",
                icon: "🎈"
            },
            'bisou': {
                title: "Le Bisou de Tempo",
                guide: "Placez vos doigts aux commissures des lèvres pour aider à arrondir (OU) ou étirer (III).",
                instructions: "Fais un long 'OUUU' ou 'IIII' !",
                icon: "👄"
            },
            'saut': {
                title: "Le Saut de la Langue",
                guide: "Pression sous le menton pour le 'KA' ou sous la lèvre inférieure pour le 'TA'.",
                instructions: "Dis 'TA' ou 'KA' pour faire sauter le personnage !",
                icon: "👅"
            }
        },

        pools: {
            'A': ['Chat', 'Bras', 'Rat', 'Sac', 'Lac'],
            'B': ['Bateau', 'Balle', 'Bulle', 'Bébé', 'Banc'],
            'I': ['Lit', 'Nid', 'Tapis', 'Souris', 'Amis'],
            'OU': ['Loup', 'Roue', 'Clou', 'Mouche', 'Genou'],
            'T': ['Train', 'Tête', 'Tortue', 'Tapis', 'Tableau'],
            'K': ['Koala', 'Kangourou', 'Képi', 'Karaté', 'Kayak']
        },

        rewards: {
            nature: ['🌸', '🌳', '✨', '☁️', '🌈', '💎', '🌊'],
            decoration: ['🏮', '🌠', '🪑', '🌉', '🚩', '⛲'],
            adventure: ['🔭', '🏠', '🐤', '📦', '🗿']
        },

        animals: [
            { name: 'Panda', svg: '<svg viewBox="0 0 100 100" width="80"><circle cx="50" cy="50" r="40" fill="#FFC2D1"/><circle cx="35" cy="45" r="5" fill="#5D5D5D"/><circle cx="65" cy="45" r="5" fill="#5D5D5D"/><path d="M 40 65 Q 50 75 60 65" stroke="#5D5D5D" stroke-width="3" fill="none"/></svg>' },
            { name: 'Loutre', svg: '<svg viewBox="0 0 100 100" width="80"><ellipse cx="50" cy="50" rx="40" ry="30" fill="#A2D2FF"/><circle cx="35" cy="45" r="4" fill="#5D5D5D"/><circle cx="65" cy="45" r="4" fill="#5D5D5D"/><path d="M 45 55 L 55 55" stroke="#5D5D5D" stroke-width="2"/></svg>' },
            { name: 'Hibou', svg: '<svg viewBox="0 0 100 100" width="80"><path d="M 20 80 L 50 20 L 80 80 Z" fill="#FFD1A2"/><circle cx="45" cy="50" r="4" fill="#5D5D5D"/><circle cx="55" cy="50" r="4" fill="#5D5D5D"/></svg>' },
            { name: 'Kangourou', svg: '<svg viewBox="0 0 100 100" width="80"><rect x="25" y="30" width="50" height="50" rx="15" fill="#D1FFA2"/><circle cx="40" cy="50" r="4" fill="#5D5D5D"/><circle cx="60" cy="50" r="4" fill="#5D5D5D"/></svg>' }
        ],

        assets: {
            balloon: `<svg viewBox="0 0 100 100" width="120">
                <path d="M 50 10 Q 80 10 80 40 Q 80 70 50 90 Q 20 70 20 40 Q 20 10 50 10" fill="#FFC2D1" stroke="#5D5D5D" stroke-width="2"/>
                <rect x="42" y="85" width="16" height="12" fill="#D1FFA2" stroke="#5D5D5D" stroke-width="2"/>
                <line x1="30" y1="65" x2="42" y2="85" stroke="#5D5D5D" stroke-width="1"/>
                <line x1="70" y1="65" x2="58" y2="85" stroke="#5D5D5D" stroke-width="1"/>
            </svg>`,
            tempo: (state) => `<svg viewBox="0 0 100 100" width="120">
                <circle cx="50" cy="50" r="45" fill="#FFFDD0" stroke="#40E0D0" stroke-width="5"/>
                <circle cx="35" cy="40" r="5" fill="#5D5D5D"/>
                <circle cx="65" cy="40" r="5" fill="#5D5D5D"/>
                ${state === 'kiss'
                    ? '<circle cx="50" cy="70" r="10" fill="#FFC2D1" stroke="#5D5D5D" stroke-width="2"/>'
                    : '<path d="M 30 70 Q 50 90 70 70" fill="none" stroke="#FFC2D1" stroke-width="8" stroke-linecap="round"/>'}
            </svg>`,
            jumper: `<svg viewBox="0 0 100 100" width="100">
                <circle cx="50" cy="30" r="20" fill="#D1FFA2" stroke="#5D5D5D" stroke-width="2"/>
                <rect x="35" y="50" width="30" height="40" rx="10" fill="#40E0D0" stroke="#5D5D5D" stroke-width="2"/>
                <path d="M 40 90 L 30 98 M 60 90 L 70 98" stroke="#5D5D5D" stroke-width="3"/>
            </svg>`
        },

        audioCtx: null,
        analyser: null,
        dataArray: null,
        nextNoteTime: 0,
        timerID: null,
        lastBeatTime: 0,
        isVoiceActive: false,
        isVoiceLooping: false,

        init() {
            this.load();
            this.renderIsland();
            this.updateStarUI();
        },

        quit() {
            if (this.mode === 'rhythm') {
                cancelAnimationFrame(this.timerID);
            }
            this.mode = null;
            this.showScreen('screen-menu');
            document.getElementById('mic-indicator').style.display = 'none';
        },

        load() {
            this.bpm = parseInt(localStorage.getItem('emie-bpm')) || 60;
            this.delta = parseInt(localStorage.getItem('emie-delta')) || 200;
            this.micSensitivity = parseInt(localStorage.getItem('emie-mic')) || 50;
            this.stars = parseInt(localStorage.getItem('emie-stars')) || 0;
            this.islandObjects = JSON.parse(localStorage.getItem('emie-island')) || [];
            this.history = JSON.parse(localStorage.getItem('emie-history')) || [];
        },

        save() {
            localStorage.setItem('emie-bpm', this.bpm);
            localStorage.setItem('emie-delta', this.delta);
            localStorage.setItem('emie-mic', this.micSensitivity);
            localStorage.setItem('emie-stars', this.stars);
            localStorage.setItem('emie-island', JSON.stringify(this.islandObjects));
            localStorage.setItem('emie-history', JSON.stringify(this.history));
        },

        start(mode, subMode = null) {
            this.mode = mode;
            this.promptSubMode = subMode;
            this.voiceHoldCounter = 0;
            this.balloonY = 50;

            if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const isPrompt = mode === 'prompt';
            document.getElementById('parent-guide').style.display = (mode === 'voice' || isPrompt) ? 'block' : 'none';
            document.getElementById('prompt-stage').style.display = isPrompt ? 'block' : 'none';
            document.getElementById('btn-manual-validate').style.display = isPrompt ? 'inline-block' : 'none';

            if (isPrompt) {
                const config = this.promptConfigs[subMode];
                document.getElementById('current-word').textContent = config.instructions;
                document.getElementById('guide-title').textContent = config.title;
                document.getElementById('guide-text').textContent = config.guide;

                // Reset/Init visuals
                document.getElementById('prompt-balloon').innerHTML = subMode === 'ascenseur' ? this.assets.balloon : '';
                document.getElementById('prompt-tempo').innerHTML = subMode === 'bisou' ? this.assets.tempo('smile') : '';
                document.getElementById('prompt-jumper').innerHTML = subMode === 'saut' ? this.assets.jumper : '';
                document.getElementById('prompt-balloon').style.bottom = '50%';
                document.getElementById('prompt-jumper').classList.remove('jump-animation');
            } else {
                this.pickNewWord();
            }

            this.showScreen('screen-game');

            if (mode === 'rhythm') {
                this.nextNoteTime = this.audioCtx.currentTime;
                this.scheduler();
                document.getElementById('mic-indicator').style.display = 'none';
            } else {
                this.startVoice();
                document.getElementById('mic-indicator').style.display = 'block';
            }
        },

        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },

        pickNewWord() {
            const keys = Object.keys(this.pools);
            const pool = this.pools[keys[Math.floor(Math.random() * keys.length)]];
            document.getElementById('current-word').textContent = pool[Math.floor(Math.random() * pool.length)];
        },

        // Moteur de Rythme
        scheduler() {
            if (this.mode !== 'rhythm') return;
            while (this.nextNoteTime < this.audioCtx.currentTime + 0.1) {
                this.playTick();
                this.onBeat();
                this.nextNoteTime += 60.0 / this.bpm;
            }
            this.timerID = requestAnimationFrame(() => this.scheduler());
        },

        playTick() {
            const osc = this.audioCtx.createOscillator();
            const envelope = this.audioCtx.createGain();
            osc.frequency.setValueAtTime(440, this.audioCtx.currentTime);
            envelope.gain.linearRampToValueAtTime(0.5, this.audioCtx.currentTime + 0.01);
            envelope.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.1);
            osc.connect(envelope).connect(this.audioCtx.destination);
            osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
        },

        onBeat() {
            const fb = document.getElementById('visual-feedback');
            fb.style.width = '100px'; fb.style.height = '100px'; fb.style.borderRadius = '50%';
            fb.style.backgroundColor = 'var(--accent-pink)'; fb.style.transform = 'translateX(-50%) scale(1.5)';
            fb.style.opacity = '0.5';
            setTimeout(() => { fb.style.transform = 'translateX(-50%) scale(1)'; fb.style.opacity = '0'; }, 100);
            this.lastBeatTime = this.audioCtx.currentTime;
        },

        handleTap() {
            if (this.mode !== 'rhythm') return;
            const now = this.audioCtx.currentTime;
            const diff = Math.min(Math.abs(now - this.lastBeatTime), Math.abs(now - (this.lastBeatTime + 60/this.bpm))) * 1000;
            if (diff < this.delta) this.onSuccess();
        },

        // Moteur de Voix
        async startVoice() {
            if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
            if (!this.isVoiceActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = this.audioCtx.createMediaStreamSource(stream);
                    this.analyser = this.audioCtx.createAnalyser();
                    this.analyser.fftSize = 256;
                    source.connect(this.analyser);
                    this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                    this.isVoiceActive = true;
                } catch (err) {
                    console.error("Mic error:", err);
                    this.showScreen('screen-menu');
                    document.getElementById('mic-indicator').style.display = 'none';
                    return;
                }
            }

            if (!this.isVoiceLooping) {
                this.isVoiceLooping = true;
                this.voiceLoop();
            }
        },

        voiceLoop() {
            if (!this.isVoiceActive || (this.mode !== 'voice' && this.mode !== 'prompt')) {
                this.isVoiceLooping = false;
                return;
            }
            this.analyser.getByteFrequencyData(this.dataArray);
            let avg = this.dataArray.reduce((a,b) => a+b) / this.dataArray.length;
            const threshold = (101 - this.micSensitivity) * 0.4;

            const fb = document.getElementById('visual-feedback');
            fb.style.width = '150px'; fb.style.height = '150px'; fb.style.borderRadius = '50%';
            fb.style.border = '5px dashed var(--accent-blue)'; fb.style.opacity = '1';
            fb.style.transform = `translateX(-50%) scale(${1 + avg/50})`;
            fb.style.backgroundColor = avg > threshold ? 'rgba(162, 210, 255, 0.3)' : 'transparent';

            // Mise à jour Vumètre
            const vumeter = document.getElementById('vumeter');
            if(vumeter) vumeter.style.width = Math.min(100, (avg/128)*100) + '%';

            if (this.mode === 'prompt') {
                if (this.promptSubMode === 'ascenseur') {
                    // Analyse fréquentielle élargie pour enfants
                    let lowFreq = 0; // "A" (Grave)
                    let highFreq = 0; // "I/OU" (Aigu)
                    for(let i=0; i<15; i++) lowFreq += this.dataArray[i];
                    for(let i=20; i<80; i++) highFreq += this.dataArray[i];

                    if (avg > threshold) {
                        if (highFreq > lowFreq * 1.2) this.balloonY = Math.min(this.balloonY + 2, 90);
                        else if (lowFreq > highFreq * 1.1) this.balloonY = Math.max(this.balloonY - 2, 10);

                        const balloon = document.getElementById('prompt-balloon');
                        balloon.style.bottom = this.balloonY + '%';

                        if (this.balloonY > 85 || this.balloonY < 15) {
                            balloon.style.transform = 'translateX(-50%) scale(1.2) rotate(15deg)';
                            setTimeout(() => balloon.style.transform = 'translateX(-50%) scale(1) rotate(0deg)', 500);
                            this.onVoiceSuccess();
                        }
                    }
                } else if (this.promptSubMode === 'bisou') {
                    if (avg > threshold) {
                        this.voiceHoldCounter++;
                        document.getElementById('prompt-tempo').innerHTML = this.assets.tempo('kiss');
                        if (this.voiceHoldCounter > 100) { // Environ 1.6s à 60fps
                            this.onVoiceSuccess();
                            this.voiceHoldCounter = 0;
                        }
                    } else {
                        this.voiceHoldCounter = Math.max(0, this.voiceHoldCounter - 1);
                        document.getElementById('prompt-tempo').innerHTML = this.assets.tempo('smile');
                    }
                } else if (this.promptSubMode === 'saut') {
                    if (avg > threshold) {
                        const jumper = document.getElementById('prompt-jumper');
                        if (!jumper.classList.contains('jump-animation')) {
                            jumper.classList.add('jump-animation');
                            setTimeout(() => {
                                jumper.classList.remove('jump-animation');
                                this.onVoiceSuccess();
                            }, 1500);
                        }
                    }
                }
            } else if (avg > threshold) {
                this.onVoiceSuccess();
            }

            requestAnimationFrame(() => this.voiceLoop());
        },

        voiceDebounce: false,
        onVoiceSuccess() {
            if (this.voiceDebounce) return;
            this.voiceDebounce = true;
            setTimeout(() => { this.onSuccess(); this.voiceDebounce = false; }, 800);
        },

        onSuccess() {
            this.stars++;
            const modeName = this.mode === 'prompt' ? `PROMPT:${this.promptSubMode}` : this.mode;
            this.history.push({ date: new Date().toLocaleString(), mode: modeName, result: 'Succès' });
            this.triggerConfetti();
            this.updateStarUI();

            if (this.mode === 'prompt') {
                const config = this.promptConfigs[this.promptSubMode];
                const wordEl = document.getElementById('current-word');
                wordEl.textContent = "Bravo ! ⭐";
                wordEl.style.color = "var(--accent-blue)";
                wordEl.style.transform = "scale(1.2)";
                setTimeout(() => {
                    if(this.mode === 'prompt') {
                        wordEl.textContent = config.instructions;
                        wordEl.style.color = "var(--text-color)";
                        wordEl.style.transform = "scale(1)";
                    }
                }, 1000);
            }

            if (this.stars >= 3) {
                this.stars = 0;
                this.triggerRewardCycle();
            } else {
                setTimeout(() => {
                    if (this.mode === 'prompt') {
                        this.voiceHoldCounter = 0;
                        if (this.promptSubMode === 'ascenseur') {
                            this.balloonY = 50;
                            document.getElementById('prompt-balloon').style.bottom = '50%';
                        }
                    } else {
                        this.pickNewWord();
                    }
                }, 1000);
            }
            this.save();
        },

        updateStarUI() {
            document.getElementById('star-count').textContent = this.stars;
        },

        triggerRewardCycle() {
            this.mode = 'reward';
            const rewardDisplay = document.getElementById('reward-display');
            const animal = this.animals[Math.floor(Math.random() * this.animals.length)];
            const poolKeys = Object.keys(this.rewards);
            const pool = this.rewards[poolKeys[Math.floor(Math.random() * poolKeys.length)]];
            const object = pool[Math.floor(Math.random() * pool.length)];

            rewardDisplay.innerHTML = `${animal.svg} <span style="font-size:3rem; margin-left:20px;">+ ${object}</span>`;

            // Ajouter à l'île
            this.islandObjects.push({
                icon: object,
                x: Math.random() * 80 + 10,
                y: Math.random() * 70 + 10
            });

            setTimeout(() => {
                rewardDisplay.innerHTML = '';
                this.renderIsland();
                this.showScreen('screen-menu');
            }, 3000);
        },

        renderIsland() {
            const island = document.getElementById('island-view');
            island.innerHTML = '';
            this.islandObjects.forEach(obj => {
                const el = document.createElement('div');
                el.className = 'island-object';
                el.textContent = obj.icon;
                el.style.left = obj.x + '%';
                el.style.top = obj.y + '%';
                island.appendChild(el);
            });
        },

        triggerConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = [];
            for(let i=0; i<50; i++) p.push({x:Math.random()*canvas.width, y:-10, r:Math.random()*6+4, c:`hsl(${Math.random()*360},70%,70%)`, d:Math.random()*10});
            const draw = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.forEach((m,i) => {
                    ctx.fillStyle = m.c; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
                    m.y += Math.cos(m.d)+2+m.r/2; m.x += Math.sin(m.d);
                    if(m.y > canvas.height) p.splice(i,1);
                });
                if(p.length > 0) requestAnimationFrame(draw);
            };
            draw();
        }
    };

    const pro = {
        timer: null,
        init() {
            const inputs = ['bpm', 'delta', 'mic'];
            inputs.forEach(id => {
                const el = document.getElementById('setting-'+id);
                el.value = game[id === 'mic' ? 'micSensitivity' : id];
                document.getElementById('val-'+id).textContent = el.value;
                el.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value);
                    document.getElementById('val-'+id).textContent = val;
                    if(id === 'bpm') game.bpm = val;
                    if(id === 'delta') game.delta = val;
                    if(id === 'mic') game.micSensitivity = val;
                    game.save();
                });
            });
            this.updateHistory();
        },
        show() {
            this.updateHistory();
            document.getElementById('pro-panel').style.display = 'block';
        },
        hide() { document.getElementById('pro-panel').style.display = 'none'; },
        updateHistory() {
            const log = document.getElementById('history-log');
            log.innerHTML = game.history.map(h => `[${h.date}] ${h.mode}: ${h.result}`).reverse().join('<br>');
        },
        exportCSV() {
            let csv = "Date,Mode,Resultat\n";
            game.history.forEach(h => csv += `${h.date},${h.mode},${h.result}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'historique_emie.csv'; a.click();
        },
        resetIsland() {
            if(confirm("Réinitialiser l'île ?")) {
                game.islandObjects = []; game.stars = 0; game.save(); game.renderIsland(); game.updateStarUI();
            }
        }
    };

    // Listeners
    document.getElementById('tap-zone').addEventListener('click', () => game.handleTap());
    const trigger = document.getElementById('pro-trigger');
    const startTrigger = (e) => { e.preventDefault(); pro.timer = setTimeout(() => pro.show(), 5000); };
    const stopTrigger = () => clearTimeout(pro.timer);
    trigger.addEventListener('mousedown', startTrigger);
    trigger.addEventListener('touchstart', startTrigger);
    trigger.addEventListener('mouseup', stopTrigger);
    trigger.addEventListener('touchend', stopTrigger);

    game.init();
    pro.init();
</script>

</body>
